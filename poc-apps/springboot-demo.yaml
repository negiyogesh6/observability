apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-demo
  namespace: staging
  labels:
    app: springboot-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springboot-demo
  template:
    metadata:
      labels:
        app: springboot-demo
      annotations:
        # This single annotation does everything:
        # - Injects OTel Java agent as init container
        # - Auto-instruments Spring MVC, JDBC, RestTemplate
        # - Captures JVM metrics (heap, GC, threads) via runtime-telemetry
        # - Sends traces + metrics to OTel Collector
        # NO CODE CHANGES NEEDED IN THE APP
        instrumentation.opentelemetry.io/inject-java: "monitoring/java-instrumentation"
    spec:
      containers:
        - name: springboot-demo
          image: 391897533456.dkr.ecr.ap-south-1.amazonaws.com/yogesh-test:Latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OTEL_SERVICE_NAME
              value: springboot-demo
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=staging,service.version=1.0"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: springboot-demo
  namespace: staging
  labels:
    app: springboot-demo
spec:
  selector:
    app: springboot-demo
  ports:
    - name: http
      port: 80
      targetPort: 8080
