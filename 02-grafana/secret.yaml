apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: monitoring
type: Opaque
data:
  # Generate: echo -n 'admin' | base64
  admin-user: YWRtaW4=
  # REQUIRED: Replace with a strong password before deploying
  # Generate: echo -n 'your-strong-password' | base64
  # Recommended: Use AWS Secrets Manager + External Secrets Operator instead
  admin-password: REPLACE_WITH_BASE64_ENCODED_STRONG_PASSWORD
