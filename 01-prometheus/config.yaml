apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      # Kubernetes nodes via kubelet
      - job_name: kubernetes-nodes
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # cAdvisor (container metrics)
      - job_name: kubernetes-cadvisor
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - target_label: __metrics_path__
            replacement: /metrics/cadvisor

      # Pods with prometheus.io/scrape annotation
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app

      # Service endpoints
      - job_name: kubernetes-service-endpoints
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_service_name]
            target_label: service

      # kube-state-metrics
      - job_name: kube-state-metrics
        static_configs:
          - targets: ['kube-state-metrics.monitoring.svc.cluster.local:8080']

      # node-exporter
      - job_name: node-exporter
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__address__]
            regex: (.+):(.+)
            replacement: $1:9100
            target_label: __address__

      # OTel collector metrics (APM + JVM)
      - job_name: otel-collector
        static_configs:
          - targets: ['otel-collector.monitoring.svc.cluster.local:8889']
        relabel_configs:
          - source_labels: [exported_job]
            target_label: job
          - source_labels: [exported_instance]
            target_label: instance

      # Blackbox Exporter — HTTP probing for all services
      - job_name: blackbox-http
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets:
              - http://springboot-demo.staging.svc.cluster.local/api/health
              - http://java-demo-app.staging.svc.cluster.local/health
              - http://nodejs-demo-app.staging.svc.cluster.local/health
              - http://python-demo-app.staging.svc.cluster.local/health
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter.monitoring.svc.cluster.local:9115
          # Extract service name from URL for cleaner labels
          - source_labels: [__param_target]
            regex: 'http://([^.]+)\..*'
            replacement: '$1'
            target_label: service_name

  rules.yml: |
    groups:
      - name: eks-alerts
        rules:
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
              description: "Pod has been restarting for more than 5 minutes"

          - alert: PodNotReady
            expr: kube_pod_status_ready{condition="true"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"

          - alert: HighCpuUsage
            expr: (sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (pod, namespace) / sum(kube_pod_container_resource_limits{resource="cpu"}) by (pod, namespace)) * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} CPU > 80%"

          - alert: HighMemoryUsage
            expr: (sum(container_memory_working_set_bytes{container!=""}) by (pod, namespace) / sum(kube_pod_container_resource_limits{resource="memory"}) by (pod, namespace)) * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} memory > 80%"

          - alert: DeploymentReplicasMismatch
            expr: kube_deployment_spec_replicas != kube_deployment_status_ready_replicas
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replicas mismatch"

          - alert: NodeNotReady
            expr: kube_node_status_condition{condition="Ready", status="false"} == 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.node }} is NotReady"

          - alert: PVCNearFull
            expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"

          - alert: PVCCriticalFull
            expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.95
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is critically full ({{ $value | humanizePercentage }})"

          - alert: CPUThrottlingHigh
            expr: rate(container_cpu_cfs_throttled_seconds_total{container!=""}[5m]) / rate(container_cpu_cfs_periods_total{container!=""}[5m]) > 0.5
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Container {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} is CPU throttled > 50%"

      - name: apm-alerts
        rules:
          - alert: HighLatencyP95
            expr: histogram_quantile(0.95, sum(rate(otel_traces_spanmetrics_duration_milliseconds_bucket{span_kind="SPAN_KIND_SERVER"}[5m])) by (le, service_name)) > 2000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Service {{ $labels.service_name }} p95 latency > 2s"

          - alert: HighErrorRate
            expr: (sum(rate(otel_traces_spanmetrics_calls_total{status_code="STATUS_CODE_ERROR"}[5m])) by (service_name) / sum(rate(otel_traces_spanmetrics_calls_total[5m])) by (service_name)) * 100 > 5
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.service_name }} error rate > 5%"

      - name: blackbox-alerts
        rules:
          - alert: ServiceDown
            expr: probe_success == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.service_name }} is DOWN"
              description: "Health probe failed for {{ $labels.instance }} — service is not responding"

          - alert: ServiceSlowResponse
            expr: probe_duration_seconds > 2
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "Service {{ $labels.service_name }} is responding slowly ({{ $value | humanizeDuration }})"
              description: "Health probe for {{ $labels.instance }} taking > 2s"

          - alert: ServiceHTTPError
            expr: probe_http_status_code != 200 and probe_http_status_code != 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Service {{ $labels.service_name }} returning HTTP {{ $value }}"
              description: "Unexpected HTTP status code from {{ $labels.instance }}"

          - alert: SSLCertExpiringSoon
            expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 30
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "SSL cert for {{ $labels.instance }} expires in {{ $value | humanize }} days"

          - alert: SSLCertExpiryCritical
            expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 7
            for: 1h
            labels:
              severity: critical
            annotations:
              summary: "SSL cert for {{ $labels.instance }} expires in {{ $value | humanize }} days — URGENT"
